# 除權息行事曆（範本）
#
# 用途：在除權息日 D 與 D+1 兩個交易日內，自動停損（is_auto_stop=True）會被擋下
#       避免「除權息跳空 → avg_price 沒調 → 觸發假停損」
#
# 維護方式：
#   1. prod 機複製為 data/ex_dividend_calendar.yaml（gitignored）
#   2. 從 TWSE「除權除息預告表」抄錄白名單股票的除權息日
#      https://www.twse.com.tw/zh/exchangeReport/TWT48U
#   3. 每月維護一次（至少在月初與月中各更新一次）
#
# 格式：symbol（含 .TW 尾碼）→ list of YYYY-MM-DD 字串
#
# 提醒：v2 會接 TWSE API 自動抓；v1 手動為主，記得更新

# ── 範例（請依實際公告調整）──
"2330.TW":            # 台積電
  - "2026-06-19"
"2454.TW":            # 聯發科
  - "2026-07-15"
"2317.TW":            # 鴻海
  - "2026-07-23"
"2308.TW":            # 台達電
  - "2026-07-30"
