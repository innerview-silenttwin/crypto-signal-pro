# 台股休市日（範本）
#
# 用途：market_hours.is_holiday() 用此擋下休市日的下單與訊號計算
#
# 維護方式：
#   1. prod 機複製為 data/tw_holidays.yaml（gitignored）
#   2. 每年 1 月初從 TWSE「臺灣證券交易所行事曆」更新
#      https://www.twse.com.tw/zh/holidaySchedule/holidaySchedule
#
# 格式：YAML root 必須是 mapping，holidays key 內放 YYYY-MM-DD 字串列表

holidays:
  # 2026 範例（實際請查 TWSE 公告）
  - "2026-01-01"   # 元旦
  - "2026-02-16"   # 春節調整
  - "2026-02-17"   # 春節
  - "2026-02-18"   # 春節
  - "2026-02-19"   # 春節
  - "2026-02-20"   # 春節
  - "2026-02-27"   # 228 連假調整
  - "2026-04-03"   # 清明 + 兒童
  - "2026-04-06"   # 兒童節調整
  - "2026-05-01"   # 勞動節
  - "2026-06-19"   # 端午節（如剛好遇除權息要兼顧 ex_dividend_calendar.yaml）
  - "2026-09-25"   # 中秋節
  - "2026-10-09"   # 國慶連假
  - "2026-10-12"   # 國慶連假
