<!DOCTYPE html>
<html lang="zh-TW" data-theme="kawaii">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector Trading | 台股交易中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        (function() {
            var t = localStorage.getItem('csp-theme') || 'kawaii';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        /* ── 類股 Tab 切換 ── */
        .sector-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            border: 1.5px solid var(--border-color);
        }
        .sector-tab {
            flex: 1;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            background: rgba(167,139,250,0.04);
            color: var(--text-muted);
            border: none;
            transition: all 0.2s;
            font-family: 'Nunito', 'Outfit', sans-serif;
        }
        .sector-tab:not(:last-child) {
            border-right: 1.5px solid var(--border-color);
        }
        .sector-tab:hover {
            background: rgba(167,139,250,0.1);
        }
        .sector-tab.active {
            background: var(--primary);
            color: #fff;
        }
        .sector-tab .tab-indicator {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .sector-tab .tab-indicator.on { background: #34d399; }
        .sector-tab .tab-indicator.off { background: #94a3b8; }

        /* ── 佈局 ── */
        .sector-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            padding: 0 24px 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-card {
            padding: 10px 12px;
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .stat-value {
            font-size: 17px;
            font-weight: 800;
            font-family: 'Nunito', 'Outfit';
            color: var(--text-main);
        }
        .stat-value.positive { color: var(--buy-color, #10b981); }
        .stat-value.negative { color: var(--sell-color, #ef4444); }

        /* ── 策略卡片 ── */
        .strategy-card {
            padding: 18px;
            margin-bottom: 16px;
        }
        .strategy-card h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .strategy-detail {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.8;
        }
        .strategy-detail strong { color: var(--text-main); }
        .weight-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .weight-segment {
            height: 6px;
            border-radius: 3px;
            background: var(--primary);
            opacity: 0.7;
        }

        /* ── 持倉 ── */
        .holding-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(167,139,250,0.06);
            font-size: 13px;
        }
        .holding-item:last-child { border-bottom: none; }
        .holding-name { font-weight: 700; color: var(--text-main); }
        .holding-detail { color: var(--text-muted); font-size: 11px; }

        /* ── 權益圖表 ── */
        .chart-container {
            position: relative;
            height: 200px;
            margin-bottom: 16px;
        }

        /* ── 控制列 ── */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            margin-bottom: 16px;
        }
        .control-bar .status-text {
            font-size: 13px;
            font-weight: 700;
        }
        .btn-toggle {
            padding: 8px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s;
        }
        .btn-toggle.start {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: #fff;
        }
        .btn-toggle.stop {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: #fff;
        }

        /* ── 全域控制 ── */
        .global-control-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 20px;
            background: rgba(167,139,250,0.04);
            border-radius: 16px;
            margin: 0 24px 16px;
            border: 1.5px solid var(--border-color);
        }
        .global-control-bar .ctrl-divider {
            width: 1.5px;
            height: 24px;
            background: var(--border-color);
            margin: 0 4px;
        }
        .global-control-bar .btn-global {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            border: 1.5px solid var(--border-color);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            background: rgba(255,255,255,0.6);
            color: var(--text-main);
            transition: all 0.2s;
        }
        .global-control-bar .btn-global:hover {
            background: var(--primary);
            color: #fff;
        }
        .global-control-bar .btn-global.active-bg {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: #fff;
            border-color: transparent;
        }
        .auto-status {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* 歷史表格 */
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1.5px solid var(--border-color);
        }
        .history-table td {
            font-size: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(167,139,250,0.05);
            color: var(--text-main);
        }
        .history-table .buy-row td:nth-child(3) { color: var(--buy-color, #10b981); font-weight: 700; }
        .history-table .sell-row td:nth-child(3) { color: var(--sell-color, #ef4444); font-weight: 700; }
        .history-table th { position: relative; overflow: visible; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div class="logo">
                <span class="glow-text">CryptoSignal</span>
                <span class="pro-badge">PRO</span>
            </div>
            <div class="theme-switcher">
                <button class="theme-btn active" data-theme-value="kawaii">Kawaii</button>
                <button class="theme-btn" data-theme-value="pro-dark">Pro Dark</button>
                <button class="theme-btn" data-theme-value="ocean">Ocean</button>
                <button class="theme-btn" data-theme-value="warm">Warm</button>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">分析儀表板</a>
                <a href="trading.html" class="nav-item">幣圈交易中心</a>
                <a href="sector_trading.html" class="nav-item active">台股交易中心</a>
            </nav>
            <div class="market-panel" style="margin-top:auto; background:rgba(167,139,250,0.05); padding:16px; border-radius:14px; border:1.5px solid rgba(167,139,250,0.1)">
                <div style="font-size:11px; color:var(--text-muted); margin-bottom:8px; font-weight:700">類股自動交易</div>
                <div style="font-size:13px; font-weight:600">背景引擎: <span id="sidebar-auto-status" class="status-badge inactive">未啟動</span></div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>台股交易中心 (Sector Trading Center)</h1>
                <div class="top-bar-right">
                    <span id="last-refresh" style="font-size:12px; color:var(--text-muted)">最後更新: --</span>
                </div>
            </header>

            <!-- 全域控制列 -->
            <div class="global-control-bar glass-panel">
                <button id="btn-start-auto" class="btn-global">啟動背景交易引擎</button>
                <button id="btn-stop-auto" class="btn-global">停止</button>
                <button id="btn-run-once" class="btn-global">手動執行一次</button>
                <div class="ctrl-divider"></div>
                <button id="btn-toggle-sector" class="btn-toggle start" style="padding:8px 20px; font-size:13px">開啟交易</button>
                <div class="auto-status">
                    <span id="auto-status-text">引擎狀態: 未啟動</span>
                    <span style="margin-left:12px" id="auto-last-run">上次執行: --</span>
                </div>
            </div>

            <!-- 各類股損益長條圖 -->
            <div class="glass-panel" style="margin: 0 24px 16px; padding: 12px 20px 8px">
                <div style="font-size:11px; color:var(--text-muted); margin-bottom:6px; font-weight:700">各類股損益比較</div>
                <div style="height:150px; position:relative">
                    <canvas id="sector-bar-chart"></canvas>
                </div>
            </div>

            <!-- 類股 Tab -->
            <div class="sector-tabs" style="margin: 0 24px 16px" id="sector-tabs">
                <!-- 動態生成 -->
            </div>

            <!-- 類股內容 -->
            <div id="sector-content">
                <!-- 隱藏元素，供 JS 更新用（不顯示） -->
                <span id="sector-title" style="display:none"></span>
                <span id="sector-desc" style="display:none"></span>

                <div class="sector-layout">
                    <div class="sector-main">
                        <!-- 數據卡片 -->
                        <div class="stats-grid">
                            <div class="stat-card glass-panel" style="border-top: 2px solid var(--primary)">
                                <div class="stat-label">五類總損益</div>
                                <div class="stat-value" id="g-pl">--</div>
                            </div>
                            <div class="stat-card glass-panel" style="border-top: 2px solid var(--primary)">
                                <div class="stat-label">五類總投報率</div>
                                <div class="stat-value" id="g-roi">--</div>
                            </div>
                            <div class="stat-card glass-panel">
                                <div class="stat-label">當前類股淨值</div>
                                <div class="stat-value" id="s-equity">--</div>
                            </div>
                            <div class="stat-card glass-panel" id="s-pl-card">
                                <div class="stat-label">當前類股損益</div>
                                <div class="stat-value" id="s-pl">--</div>
                            </div>
                            <div class="stat-card glass-panel">
                                <div class="stat-label">當前類股勝率</div>
                                <div class="stat-value" id="s-winrate">--</div>
                            </div>
                        </div>

                        <!-- 交易歷史 -->
                        <div class="card glass-panel" style="padding:20px">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                                <h3 style="font-size:14px; color:var(--text-main)">交易歷史</h3>
                                <div style="display:flex; gap:8px">
                                    <button id="btn-prev" class="btn-global" style="padding:4px 12px; font-size:11px">上一頁</button>
                                    <span id="page-info" style="font-size:11px; align-self:center; color:var(--text-muted)">1</span>
                                    <button id="btn-next" class="btn-global" style="padding:4px 12px; font-size:11px">下一頁</button>
                                </div>
                            </div>
                            <div style="max-height:400px; overflow-y:auto">
                                <table class="history-table">
                                    <thead>
                                        <tr>
                                            <th>時間</th>
                                            <th>標的</th>
                                            <th>操作</th>
                                            <th>成交價</th>
                                            <th>數量 <span class="info-tooltip" data-tip="交易股數。每次買入投入帳戶餘額的 20%，依成交價換算股數。"><i>i</i></span></th>
                                            <th>損益 <span class="info-tooltip" data-tip="買進：若已賣出顯示已實現損益，若仍持有顯示未實現損益（依最新價計算），部分賣出則合計顯示。賣出：顯示已實現損益。所有損益皆已扣除手續費+證交稅。"><i>i</i></span></th>
                                            <th>信號 <span class="info-tooltip" data-tip="記錄交易當下的分數，非現在即時分數。格式：(技術XX, 綜合XX, 強度) [盤勢]。技術分=指標經各層修正後的信號分，決定進出場時機。綜合分=五維加權平均(籌碼+技術+基本面+盤勢+消息)，決定標的品質。買入需：技術分≥門檻 且 綜合分≥50。賣出/停損僅看技術分。"><i>i</i></span></th>
                                        </tr>
                                    </thead>
                                    <tbody id="history-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 右側欄 -->
                    <div class="sector-side">
                        <!-- 策略設定 -->
                        <div class="strategy-card card glass-panel">
                            <h4>交易策略 <span class="info-tooltip" data-tip="每個類股有各自的策略權重，由回測結果決定最佳組合。10 項技術指標（EMA交叉、ADX、MACD、RSI、成交量、VolumeReversal、PullbackSupport、StochRSI、布林、MFI）各有權重，加總＝100 分。買入門檻：技術信號分數須達此分數才觸發買入。賣出門檻：技術信號分數達此分數觸發賣出。停損/停利：持倉損益達設定百分比時自動平倉。"><i>i</i></span></h4>
                            <div class="strategy-detail" id="strategy-info">--</div>
                            <div class="weight-bar" id="weight-bar"></div>
                        </div>

                        <!-- 盤勢辨識 -->
                        <div class="card glass-panel" style="padding:18px; margin-bottom:16px">
                            <h4 style="font-size:14px; margin-bottom:10px; color:var(--text-main)">盤勢辨識 <span class="info-tooltip" data-tip="分析每檔標的的市場趨勢狀態，共 6 種判定：強勢多頭（均線多排+量增，買入×1.3）、多頭（趨勢向上，買入×1.15）、底部轉強（底部訊號，買入×1.4+加分10）、盤整（方向不明，買賣信號皆×0.6）、高檔轉折（頭部警告，否決買入，賣出×1.5）、空頭（趨勢向下，否決買入，賣出×1.3）。判斷依據：趨勢方向（頭頭高底底高）、均線排列（5/10/20/60MA）、K線型態、量價分析、ADX趨勢強度。"><i>i</i></span></h4>
                            <div id="regime-list" style="font-size:12px; color:var(--text-muted)">載入中...</div>
                        </div>

                        <!-- 基本面分析 -->
                        <div class="card glass-panel" style="padding:18px; margin-bottom:16px">
                            <h4 style="font-size:14px; margin-bottom:10px; color:var(--text-main)">基本面分析 <span class="info-tooltip" data-tip="從 TWSE 公開資料取得本益比(P/E)、殖利率、股價淨值比(P/B)、營收月增率(MoM)及年增率(YoY)。將個股 P/E 與同類股比較，計算百分位排名：低估（P/E 偏低）加分、高估（P/E 偏高）減分。營收成長也會影響分數。此分數納入五維綜合分數的「基本面」維度。"><i>i</i></span></h4>
                            <div id="fundamental-list" style="font-size:12px; color:var(--text-muted)">載入中...</div>
                        </div>

                        <!-- 持倉 -->
                        <div class="card glass-panel" style="padding:18px; margin-bottom:16px">
                            <h4 style="font-size:14px; margin-bottom:10px; color:var(--text-main)">當前持倉 <span class="info-tooltip" data-tip="顯示該類股目前持有的標的。每檔顯示股數、買入均價、市值及未實現損益。損益計算已扣除買進手續費（0.1425%），賣出時另扣手續費＋證交稅（0.3%）。"><i>i</i></span></h4>
                            <div id="holdings-list">
                                <div style="font-size:12px; color:var(--text-muted)">目前無持倉</div>
                            </div>
                        </div>

                        <!-- 績效統計 -->
                        <div class="card glass-panel" style="padding:18px">
                            <h4 style="font-size:14px; margin-bottom:10px; color:var(--text-main)">績效統計 <span class="info-tooltip" data-tip="統計該類股所有已完成（已平倉）的交易。勝＝賣出淨收入 > 買進總成本。勝率＝勝的次數 / 總交易次數。已實現損益＝所有已平倉交易的實際盈虧加總（已扣手續費＋證交稅）。"><i>i</i></span></h4>
                            <div class="strategy-detail" id="perf-stats">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
    (function() {
        const API = '';
        const SECTORS = ['semiconductor', 'electronics', 'finance', 'traditional', 'telecom'];
        const SECTOR_LABELS = {
            semiconductor: '半導體', electronics: '電子代工/零組件',
            finance: '金融', traditional: '傳產/航運', telecom: '電信/其他'
        };
        const WEIGHT_NAMES = {
            rsi: 'RSI', macd: 'MACD', bollinger: 'BB',
            mfi: 'MFI', ema_cross: 'EMA', volume: 'Vol', adx: 'ADX',
            stoch_rsi: 'StochRSI', volume_reversal: 'VR', pullback_support: 'PS'
        };
        const WEIGHT_COLORS = [
            '#a78bfa','#34d399','#f59e0b','#60a5fa','#f472b6','#fb923c','#38bdf8',
            '#e879f9','#4ade80','#fbbf24'
        ];

        let currentSector = SECTORS[0];
        let sectorsData = {};
        let historyPage = 1;
        let sectorBarChart = null;

        // ── Init ──
        async function init() {
            // 先綁定按鈕事件（確保即使 API 失敗按鈕仍可用）
            document.getElementById('btn-start-auto').onclick = startAutoTrader;
            document.getElementById('btn-stop-auto').onclick = stopAutoTrader;
            document.getElementById('btn-run-once').onclick = runOnce;
            document.getElementById('btn-toggle-sector').onclick = toggleSector;
            document.getElementById('btn-prev').onclick = () => { historyPage = Math.max(1, historyPage - 1); refreshHistory(); };
            document.getElementById('btn-next').onclick = () => { historyPage++; refreshHistory(); };

            buildTabs();
            await refreshAll();
            setInterval(refreshAll, 15000);
        }

        function buildTabs() {
            const container = document.getElementById('sector-tabs');
            container.innerHTML = SECTORS.map(id =>
                `<button class="sector-tab ${id === currentSector ? 'active' : ''}" data-sector="${id}">
                    <span class="tab-indicator off" id="tab-ind-${id}"></span>
                    ${SECTOR_LABELS[id]}
                </button>`
            ).join('');
            container.querySelectorAll('.sector-tab').forEach(btn => {
                btn.onclick = () => {
                    currentSector = btn.dataset.sector;
                    historyPage = 1;
                    document.querySelectorAll('.sector-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderSector();
                    refreshHistory();
                };
            });
        }

        // ── Data ──
        async function refreshAll() {
            try {
                const res = await fetch(API + '/api/sector-trading/sectors');
                const data = await res.json();
                data.forEach(s => { sectorsData[s.sector_id] = s; });

                // Update tab indicators
                SECTORS.forEach(id => {
                    const ind = document.getElementById('tab-ind-' + id);
                    if (ind) {
                        const d = sectorsData[id];
                        ind.className = 'tab-indicator ' + (d && d.is_active ? 'on' : 'off');
                    }
                });

                renderSector();
                renderGlobalStats();
                refreshAutoStatus();
                refreshHistory();
                refreshRegime();
                refreshFundamental();
                document.getElementById('last-refresh').textContent = '最後更新: ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error('refresh error', e);
            }
        }

        async function refreshHistory() {
            try {
                const res = await fetch(API + `/api/sector-trading/${currentSector}/history?page=${historyPage}&pageSize=15`);
                const data = await res.json();
                renderHistory(data);
            } catch(e) {}
        }

        async function refreshAutoStatus() {
            try {
                const res = await fetch(API + '/api/sector-trading/auto-trader/status');
                const data = await res.json();
                const statusEl = document.getElementById('auto-status-text');
                const lastRunEl = document.getElementById('auto-last-run');
                const sidebarEl = document.getElementById('sidebar-auto-status');
                const startBtn = document.getElementById('btn-start-auto');
                const stopBtn = document.getElementById('btn-stop-auto');

                if (data.is_running) {
                    statusEl.textContent = '引擎狀態: ✅ 運行中';
                    statusEl.style.color = 'var(--buy-color, #10b981)';
                    sidebarEl.textContent = '運行中';
                    sidebarEl.className = 'status-badge active';
                    startBtn.classList.add('active-bg');
                    startBtn.textContent = '✅ 引擎運行中';
                    stopBtn.style.display = '';
                } else {
                    statusEl.textContent = '引擎狀態: 未啟動';
                    statusEl.style.color = '';
                    sidebarEl.textContent = '未啟動';
                    sidebarEl.className = 'status-badge inactive';
                    startBtn.classList.remove('active-bg');
                    startBtn.textContent = '啟動背景交易引擎';
                    stopBtn.style.display = '';
                }
                lastRunEl.textContent = '上次執行: ' + (data.last_run_time || '--');
            } catch(e) {
                console.error('refreshAutoStatus error:', e);
            }
        }

        async function refreshRegime() {
            try {
                const res = await fetch(API + `/api/sector-trading/${currentSector}/regime`);
                const data = await res.json();
                renderRegime(data);
            } catch(e) {
                console.error('refreshRegime error:', e);
            }
        }

        const REGIME_STYLES = {
            '強勢多頭': { color: '#10b981', icon: '🚀', bg: 'rgba(16,185,129,0.08)' },
            '多頭':     { color: '#34d399', icon: '📈', bg: 'rgba(52,211,153,0.08)' },
            '盤整':     { color: '#f59e0b', icon: '↔️', bg: 'rgba(245,158,11,0.08)' },
            '空頭':     { color: '#ef4444', icon: '📉', bg: 'rgba(239,68,68,0.08)' },
            '高檔轉折': { color: '#f87171', icon: '⚠️', bg: 'rgba(248,113,113,0.08)' },
            '底部轉強': { color: '#60a5fa', icon: '💎', bg: 'rgba(96,165,250,0.08)' },
        };

        window.goToStock = function(symbol) {
            const sym = symbol.includes('.') ? symbol : symbol + '.TW';
            localStorage.setItem('csp-pending-symbol', sym);
            localStorage.setItem('csp-pending-market', 'stock');
            window.location.href = 'index.html';
        };

        function renderRegime(data) {
            const el = document.getElementById('regime-list');
            if (!data || !data.stocks) {
                el.innerHTML = '<div style="color:var(--text-muted)">無數據</div>';
                return;
            }
            const stocks = data.stocks;
            const keys = Object.keys(stocks);
            if (keys.length === 0) {
                el.innerHTML = '<div style="color:var(--text-muted)">無數據</div>';
                return;
            }
            el.innerHTML = keys.map(sym => {
                const s = stocks[sym];
                const style = REGIME_STYLES[s.regime] || { color: '#94a3b8', icon: '⚪', bg: 'rgba(148,163,184,0.08)' };
                const details = s.details || {};
                const pos = details.position ? `位階:${details.position.percentile}%` : '';
                const ma = details.ma_alignment ? `均線:${details.ma_alignment.score}/6` : '';
                return `<div style="padding:6px 8px; margin-bottom:4px; border-radius:8px; background:${style.bg}; display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <span style="font-weight:700; color:var(--text-main); font-size:12px; cursor:pointer; text-decoration:underline dotted" onclick="window.goToStock('${sym}')" title="前往主頁">${s.name || sym}</span>
                        <span style="font-size:10px; color:var(--text-muted); margin-left:4px">${pos} ${ma}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px">
                        <span style="font-size:10px; color:${style.color}; font-weight:700">${style.icon} ${s.regime}</span>
                        <span style="font-size:9px; color:var(--text-muted)">${s.buy_score}/${s.sell_score}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Fundamental ──
        const VALUATION_STYLES = {
            '明顯低估': { color: '#10b981', icon: '💰', bg: 'rgba(16,185,129,0.08)' },
            '偏低估':   { color: '#34d399', icon: '📗', bg: 'rgba(52,211,153,0.08)' },
            '合理':     { color: '#f59e0b', icon: '📊', bg: 'rgba(245,158,11,0.08)' },
            '偏高估':   { color: '#f87171', icon: '📕', bg: 'rgba(248,113,113,0.08)' },
            '明顯高估': { color: '#ef4444', icon: '⚠️', bg: 'rgba(239,68,68,0.08)' },
            '無數據':   { color: '#94a3b8', icon: '—',  bg: 'rgba(148,163,184,0.05)' },
        };

        async function refreshFundamental() {
            try {
                const res = await fetch(API + `/api/sector-trading/${currentSector}/fundamental`);
                const data = await res.json();
                renderFundamental(data);
            } catch(e) {
                console.error('refreshFundamental error:', e);
            }
        }

        function renderFundamental(data) {
            const el = document.getElementById('fundamental-list');
            if (!data || !data.stocks) {
                el.innerHTML = '<div style="color:var(--text-muted)">無數據</div>';
                return;
            }
            const stocks = data.stocks;
            const keys = Object.keys(stocks);
            if (keys.length === 0) {
                el.innerHTML = '<div style="color:var(--text-muted)">無數據</div>';
                return;
            }
            el.innerHTML = keys.map(sym => {
                const s = stocks[sym];
                const valuation = s.valuation || '無數據';
                const style = VALUATION_STYLES[valuation] || VALUATION_STYLES['無數據'];
                const pe = s.pe != null ? `P/E:${s.pe.toFixed(1)}` : 'P/E:--';
                const dy = s.dy != null ? `殖利率:${s.dy.toFixed(1)}%` : '';
                const pb = s.pb != null ? `P/B:${s.pb.toFixed(2)}` : '';
                const median = s.sector_median_pe != null ? `(類股中位:${s.sector_median_pe})` : '';
                return `<div style="padding:6px 8px; margin-bottom:4px; border-radius:8px; background:${style.bg}; display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <span style="font-weight:700; color:var(--text-main); font-size:12px; cursor:pointer; text-decoration:underline dotted" onclick="window.goToStock('${sym}')" title="前往主頁">${s.name || sym}</span>
                        <span style="font-size:10px; color:var(--text-muted); margin-left:4px">${pe} ${median}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px">
                        <span style="font-size:10px; color:${style.color}; font-weight:700">${style.icon} ${valuation}</span>
                        <span style="font-size:9px; color:var(--text-muted)">${dy} ${pb}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Actions ──
        async function startAutoTrader() {
            const btn = document.getElementById('btn-start-auto');
            btn.textContent = '啟動中...';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/api/sector-trading/auto-trader/start', { method: 'POST' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                console.log('Auto trader start response:', data);
                await refreshAutoStatus();
            } catch (e) {
                console.error('啟動背景交易引擎失敗:', e);
                alert('啟動失敗: ' + e.message + '\n請確認後端伺服器正在運行');
            } finally {
                btn.textContent = '啟動背景交易引擎';
                btn.disabled = false;
            }
        }
        async function stopAutoTrader() {
            const btn = document.getElementById('btn-stop-auto');
            btn.textContent = '停止中...';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/api/sector-trading/auto-trader/stop', { method: 'POST' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                await refreshAutoStatus();
            } catch (e) {
                console.error('停止背景交易引擎失敗:', e);
                alert('停止失敗: ' + e.message);
            } finally {
                btn.textContent = '停止';
                btn.disabled = false;
            }
        }
        async function runOnce() {
            const btn = document.getElementById('btn-run-once');
            btn.textContent = '執行中...';
            btn.disabled = true;
            try {
                const res = await fetch(API + '/api/sector-trading/auto-trader/run-once', { method: 'POST' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                setTimeout(() => {
                    btn.textContent = '手動執行一次';
                    btn.disabled = false;
                    refreshAll();
                }, 5000);
            } catch (e) {
                console.error('手動執行失敗:', e);
                alert('手動執行失敗: ' + e.message);
                btn.textContent = '手動執行一次';
                btn.disabled = false;
            }
        }
        async function toggleSector() {
            const btn = document.getElementById('btn-toggle-sector');
            btn.disabled = true;
            try {
                const d = sectorsData[currentSector];
                const next = !(d && d.is_active);
                const res = await fetch(API + `/api/sector-trading/${currentSector}/toggle?active=${next}`, { method: 'POST' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                await refreshAll();
            } catch (e) {
                console.error('切換類股交易失敗:', e);
                alert('操作失敗: ' + e.message);
            } finally {
                btn.disabled = false;
            }
        }

        // ── 五類彙總統計 ──
        function renderGlobalStats() {
            const all = Object.values(sectorsData);
            if (!all.length) return;
            const INITIAL_TOTAL = all.length * 1000000;
            const totalPl = all.reduce((s, d) => s + (d.total_pl || 0), 0);
            const totalRoi = INITIAL_TOTAL > 0 ? (totalPl / INITIAL_TOTAL * 100) : 0;
            const roiStr = (totalRoi >= 0 ? '+' : '') + totalRoi.toFixed(2) + '%';
            const plStr = (totalPl >= 0 ? '+' : '') + totalPl.toLocaleString(undefined, {maximumFractionDigits: 0});

            const gPl = document.getElementById('g-pl');
            gPl.textContent = plStr;
            gPl.className = 'stat-value ' + (totalPl >= 0 ? 'positive' : 'negative');

            const gRoi = document.getElementById('g-roi');
            gRoi.textContent = roiStr;
            gRoi.className = 'stat-value ' + (totalRoi >= 0 ? 'positive' : 'negative');

            renderSectorBarChart();
        }

        // ── Render ──
        function renderSector() {
            const d = sectorsData[currentSector];
            if (!d) return;

            // Title
            document.getElementById('sector-title').textContent = d.sector_name;
            document.getElementById('sector-desc').textContent = '';

            // Toggle button
            const toggleBtn = document.getElementById('btn-toggle-sector');
            if (d.is_active) {
                toggleBtn.textContent = '停止交易';
                toggleBtn.className = 'btn-toggle stop';
            } else {
                toggleBtn.textContent = '開啟交易';
                toggleBtn.className = 'btn-toggle start';
            }

            // Stats
            document.getElementById('s-equity').textContent = d.equity.toLocaleString();
            const plEl = document.getElementById('s-pl');
            const plPct = d.total_pl_pct;
            plEl.textContent = (d.total_pl >= 0 ? '+' : '') + d.total_pl.toLocaleString() + ` (${plPct >= 0 ? '+' : ''}${plPct}%)`;
            plEl.className = 'stat-value ' + (d.total_pl >= 0 ? 'positive' : 'negative');

            const wrEl = document.getElementById('s-winrate');
            wrEl.textContent = d.stats.total_trades > 0 ? d.stats.win_rate + '%' : '--';

            // Strategy
            const st = d.strategy;
            const stEl = document.getElementById('strategy-info');
            stEl.innerHTML = `
                <strong>${st.name}</strong> (${st.param_preset})<br>
                買入門檻: <strong>${st.buy_threshold}分</strong> | 賣出門檻: <strong>${st.sell_threshold}分</strong><br>
                停損: <strong>${st.stop_loss_pct}%</strong> | 停利: <strong>${st.take_profit_pct}%</strong><br>
                <span style="font-size:11px; color:var(--text-muted); margin-top:6px; display:block">${st.description || ''}</span>
            `;

            // Weight bar
            const wb = document.getElementById('weight-bar');
            const keys = Object.keys(st.weights).sort((a,b) => st.weights[b] - st.weights[a]);
            wb.innerHTML = keys.map((k, i) =>
                `<div class="weight-segment" style="flex:${st.weights[k]}; background:${WEIGHT_COLORS[i % WEIGHT_COLORS.length]}" title="${WEIGHT_NAMES[k] || k}: ${st.weights[k]}"></div>`
            ).join('');
            wb.innerHTML += '<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; width:100%">' +
                keys.map((k, i) =>
                    `<span style="font-size:10px; color:${WEIGHT_COLORS[i % WEIGHT_COLORS.length]}; font-weight:700">${WEIGHT_NAMES[k] || k}:${st.weights[k]}</span>`
                ).join('') + '</div>';

            // Holdings
            const hl = document.getElementById('holdings-list');
            const holdings = d.holdings;
            const hKeys = Object.keys(holdings);
            if (hKeys.length === 0) {
                hl.innerHTML = '<div style="font-size:12px; color:var(--text-muted)">目前無持倉</div>';
            } else {
                hl.innerHTML = hKeys.map(sym => {
                    const h = holdings[sym];
                    const pl = h.unrealized_pl;
                    const plClass = pl > 0 ? 'positive' : pl < 0 ? 'negative' : '';
                    const noPrice = Math.abs(pl) < 1 && h.current_price === h.avg_price;
                    const plText = noPrice ? '<span style="color:var(--text-muted);font-size:11px">待更新</span>'
                        : `<span class="${plClass}">${pl >= 0 ? '+' : ''}${Math.round(pl).toLocaleString()}</span>`;
                    const plPct = h.avg_price > 0 ? ((h.current_price - h.avg_price) / h.avg_price * 100).toFixed(2) : 0;
                    const pctText = noPrice ? '' : ` <span style="font-size:10px">(${plPct >= 0 ? '+' : ''}${plPct}%)</span>`;
                    return `<div class="holding-item">
                        <div>
                            <div class="holding-name" style="cursor:pointer;text-decoration:underline dotted" onclick="window.goToStock('${sym}')" title="前往主頁查看 ${h.name || sym}">${h.name || sym}</div>
                            <div class="holding-detail">${h.qty.toLocaleString()} 股 @ ${h.avg_price}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:700; font-size:13px">
                                ${plText}${pctText}
                            </div>
                            <div class="holding-detail">市值 ${h.market_value.toLocaleString()}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            // Performance stats
            const ps = document.getElementById('perf-stats');
            ps.innerHTML = `
                已完成交易: <strong>${d.stats.total_trades}</strong><br>
                勝: <strong style="color:var(--buy-color)">${d.stats.wins}</strong> /
                敗: <strong style="color:var(--sell-color)">${d.stats.losses}</strong><br>
                勝率: <strong>${d.stats.win_rate}%</strong><br>
                已實現損益: <strong style="color:${d.stats.realized_profit >= 0 ? 'var(--buy-color)' : 'var(--sell-color)'}">
                    ${d.stats.realized_profit >= 0 ? '+' : ''}${d.stats.realized_profit.toLocaleString()}</strong>
            `;

        }

        function renderHistory(data) {
            const body = document.getElementById('history-body');
            if (!data.data || data.data.length === 0) {
                body.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:30px">暫無交易紀錄</td></tr>';
            } else {
                body.innerHTML = data.data.map(h => {
                    const isBuy = h.type === 'BUY';
                    let plText;
                    if (isBuy) {
                        if (h.pnl_status) {
                            const pnl = h.pnl || 0;
                            const color = pnl >= 0 ? 'var(--buy-color)' : 'var(--sell-color)';
                            const label = h.pnl_status === 'realized' ? '已實現'
                                        : h.pnl_status === 'partial' ? '部分實現'
                                        : '未實現';
                            plText = `<span style="color:${color}; font-weight:700">${pnl >= 0 ? '+' : ''}${Math.round(pnl).toLocaleString()}</span> <small style="color:var(--text-muted)">${label}</small>`;
                        } else {
                            plText = `<span style="color:var(--text-muted)">—</span>`;
                        }
                    } else {
                        plText = `<span style="color:${h.profit >= 0 ? 'var(--buy-color)' : 'var(--sell-color)'}; font-weight:700">${h.profit >= 0 ? '+' : ''}${(h.profit||0).toLocaleString()}</span> <small style="color:var(--text-muted)">已實現</small>`;
                    }
                    return `<tr class="${isBuy ? 'buy-row' : 'sell-row'}">
                        <td>${h.time}</td>
                        <td style="cursor:pointer;text-decoration:underline dotted" onclick="window.goToStock('${h.symbol}')" title="前往主頁查看">${h.name || h.symbol}</td>
                        <td>${isBuy ? '買進' : '賣出'}</td>
                        <td>${h.price.toLocaleString()}</td>
                        <td>${h.qty.toLocaleString()}</td>
                        <td>${plText}</td>
                        <td style="font-size:11px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${h.signal || ''}">${h.signal || ''}</td>
                    </tr>`;
                }).join('');
            }
            document.getElementById('page-info').textContent = `${historyPage} / ${Math.max(1, Math.ceil(data.total / 15))}`;
        }

        function renderSectorBarChart() {
            const ctx = document.getElementById('sector-bar-chart');
            if (!ctx) return;

            const realizedProfit = [], unrealizedProfit = [];
            const realizedLoss = [], unrealizedLoss = [];

            SECTORS.forEach(id => {
                const d = sectorsData[id];
                const rp = d ? (d.stats.realized_profit || 0) : 0;
                const up = d ? ((d.total_pl || 0) - rp) : 0;
                realizedProfit.push(Math.max(0, rp));
                unrealizedProfit.push(Math.max(0, up));
                realizedLoss.push(Math.abs(Math.min(0, rp)));
                unrealizedLoss.push(Math.abs(Math.min(0, up)));
            });

            if (sectorBarChart) {
                sectorBarChart.data.datasets[0].data = realizedLoss;
                sectorBarChart.data.datasets[1].data = unrealizedLoss;
                sectorBarChart.data.datasets[2].data = realizedProfit;
                sectorBarChart.data.datasets[3].data = unrealizedProfit;
                sectorBarChart.update('none');
                return;
            }

            sectorBarChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: SECTORS.map(id => SECTOR_LABELS[id]),
                    datasets: [
                        {
                            label: '已實現虧損',
                            data: realizedLoss,
                            backgroundColor: 'rgba(239,68,68,0.85)',
                            borderColor: '#dc2626',
                            borderWidth: 1,
                            borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 4, bottomRight: 4 },
                            stack: 'loss',
                        },
                        {
                            label: '未實現虧損',
                            data: unrealizedLoss,
                            backgroundColor: 'rgba(239,68,68,0.35)',
                            borderColor: '#dc2626',
                            borderWidth: 1,
                            borderRadius: { topLeft: 4, topRight: 4, bottomLeft: 0, bottomRight: 0 },
                            stack: 'loss',
                        },
                        {
                            label: '已實現獲利',
                            data: realizedProfit,
                            backgroundColor: 'rgba(52,211,153,0.85)',
                            borderColor: '#10b981',
                            borderWidth: 1,
                            borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 4, bottomRight: 4 },
                            stack: 'profit',
                        },
                        {
                            label: '未實現獲利',
                            data: unrealizedProfit,
                            backgroundColor: 'rgba(52,211,153,0.35)',
                            borderColor: '#10b981',
                            borderWidth: 1,
                            borderRadius: { topLeft: 4, topRight: 4, bottomLeft: 0, bottomRight: 0 },
                            stack: 'profit',
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: { font: { size: 10 }, color: '#94a3b8', boxWidth: 12, padding: 8 }
                        },
                        tooltip: {
                            callbacks: {
                                label: item => ' ' + item.dataset.label + ': ' + Math.round(item.raw).toLocaleString() + ' 元'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { font: { size: 11 }, color: '#94a3b8' },
                            grid: { display: false },
                        },
                        y: {
                            ticks: {
                                font: { size: 10 }, color: '#94a3b8',
                                callback: v => Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'K' : v
                            },
                            grid: { color: 'rgba(167,139,250,0.06)' }
                        }
                    }
                }
            });
        }

        // ── Theme ──
        (function() {
            var currentTheme = localStorage.getItem('csp-theme') || 'kawaii';
            var btns = document.querySelectorAll('.theme-btn');
            function setActiveBtn(theme) {
                btns.forEach(b => b.classList.toggle('active', b.getAttribute('data-theme-value') === theme));
            }
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('csp-theme', theme);
                setActiveBtn(theme);
            }
            setActiveBtn(currentTheme);
            btns.forEach(btn => btn.addEventListener('click', function() { applyTheme(this.getAttribute('data-theme-value')); }));
        })();

        init();
    })();
    </script>
    <script src="tooltip.js"></script>
</body>
</html>
